{% extends 'admin/base.html' %}
{% block title %}
Admin Analysis Home Page
{% endblock %}

{% block content %}
<style>
  .nav-item, ul li {
    text-decoration: none;
    list-style-type: none;
    color: brown;
}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
  integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<div class="container-fluid">
  <h1>Admin Analysis</h1>
  <div>
    <ul class="nav nav-underline justify-content-center" id="myTab" role="tablist">
      <li class="nav-item" role="presentation" style="margin-right: 20px;">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#sub" type="button" role="tab"
          aria-controls="sub" aria-selected="true">Subscription</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ratings" type="button" role="tab"
          aria-controls="ratings" aria-selected="false">Ratings</button>
      </li>
    </ul>
    <div class="tab-content" id="myTabContent">
      <div class="tab-pane fade show active" id="sub" role="tabpanel" aria-labelledby="sub-tab">
        <div class="p-4">
          <h1 class="text-center">Subscription page</h1>
          <div id="subs"></div>
          <div style="margin-bottom: 20px;">
            <script>
              var subData = JSON.parse('{{ sub_data | escapejs }}')
              var tracesub = {
                x: ['With Subscriptions', 'Without Subscriptions'],
                y: [subData['with_subs'], subData['without_subs']],
                type: 'bar',
                name: 'non-Subscription Vs Subscription'
              }

              var layoutS = {
                title: 'Subscriptions Analysis',
                hovermode: 'closest'
              }

              var configS = {
                staticPlot: false,
                displayModeBar: false,
                responsive: true
              }

              Plotly.newPlot('subs', [tracesub], layoutS, configS)
            </script>
          </div>
          <div class="text-center">
          </div>
        </div>

        <div class="tab-pane fade" id="ratings" role="tabpanel" aria-labelledby="ratings-tab">
          <div class="p-4">
            <h1 class="text-center">Ratings page</h1>
            <div id="top_rated"></div>
            <div style="margin-bottom: 20px;">
              <script>
                var ratingData = JSON.parse('{{ rating_data | safe }}');

                var trace = {
                  x: ratingData.titles,
                  y: ratingData.ratings,
                  type: 'bar'
                };

                var layout = {
                  title: 'Top Rated Movies',
                  xaxis: { title: 'Titles' },
                  yaxis: { title: 'Total Ratings' },
                };

                var config = {
                  staticPlot: false,
                  displayModeBar: false,
                  responsive: true,
                };

                Plotly.newPlot('top_rated', [trace], layout, config);

              </script>
            </div>
          </div>
          <div class="text-center"></div>
        </div>
        <div class="tab-pane fade" id="contact-tab-pane" role="tabpanel" aria-labelledby="contact-tab" tabindex="0">
          ...</div>
        <div class="tab-pane fade" id="disabled-tab-pane" role="tabpanel" aria-labelledby="disabled-tab" tabindex="0">
          ...</div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  {% endblock %}

  <!-- <img src="#" alt="Subscription Analysis"><img src="#" alt="Most Watched"></a> -->
