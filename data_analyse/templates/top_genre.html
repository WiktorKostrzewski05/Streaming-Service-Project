{% extends 'admin/base.html' %}
{% block title %}
  Top genre
{% endblock %}

{% block content %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h1 class="text-center">Top Genre page</h1>
        <div id="most_watched"></div>
        <div style="margin-bottom: 20px;">
          <script>
          var plot_data = {{ plot_data | safe}};
          
          var trace = {
              x: plot_data.titles,
              y: plot_data.total_views,
              type: 'bar'
          };

          var layout = {
              title: 'Most Watched Titles',
              xaxis: { title: 'Titles' },
              yaxis: { title: 'Total Views' }
          };

          var config = {
              staticPlot: false,
              displayModeBar: false,
              responsive: true,
          };

          Plotly.newPlot('most_watched', [trace], layout, config);
        </script>
        </div>
        <div class="text-center">
          <a href="{% url 'admin_analysis' %}" class="btn btn-primary btn-lg">Back</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
