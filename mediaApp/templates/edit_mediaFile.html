{% extends 'admin/base.html' %}

{% load crispy_forms_tags %}

{% load static %}

{% block content %}
  <style>
    .nav-item,
    ul li {
      text-decoration: none;
      list-style-type: none;
      color: brown;
    }
  </style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
  <div class="d-flex justify-content-center p-3">
    <form id="login-form" style="max-width: 1000px; height: 60vh;" class="glass w-100 p-4 position-relative rounded rounded-5" method="post" onsubmit="return validateForm()">
      <p class="text-center  display-5">Edit Media File</p>
      {% csrf_token %}
      {{ form|crispy }}

      <div class="d-flex justify-content-center">
        <button id="btn" class="mt-5 btn btn-lg btn-primary px-4 mb-2 text-center" type="submit">Submit</button>
      </div>
    </form>
  </div>
{% endblock %}
